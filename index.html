<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Клавиатурный тренажёр МШП</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <img class="corner-logo" src="assets/logo.png" alt="МШП">

      <section class="screen menu-screen active" id="menuScreen" aria-label="Меню тренажера">
        <div class="cloud cloud-a"></div>
        <div class="cloud cloud-b"></div>
        <div class="menu-shell">
          <div class="menu-intro">
            <h1><span>Клавиатурный</span><span>тренажёр</span></h1>
          </div>

          <div class="menu-card">
            <h2>Режим игры</h2>
            <div class="mode-grid" role="radiogroup" aria-label="Режим игры">
              <button class="mode-card active" type="button" data-mode="letters" aria-pressed="true">
                <span>Аа</span>
                <strong>Буквы</strong>
              </button>
              <button class="mode-card" type="button" data-mode="symbols" aria-pressed="false">
                <span>?!</span>
                <strong>Знаки</strong>
              </button>
              <button class="mode-card" type="button" data-mode="numbers" aria-pressed="false">
                <span>12</span>
                <strong>Числа</strong>
              </button>
              <button class="mode-card" type="button" data-mode="phrases" aria-pressed="false">
                <span>""</span>
                <strong>Фразы</strong>
              </button>
            </div>

            <div class="settings">
              <label>
                Время
                <select id="durationSelect">
                  <option value="20">20 секунд</option>
                  <option value="45">45 секунд</option>
                  <option value="60" selected>60 секунд</option>
                  <option value="90">90 секунд</option>
                </select>
              </label>
              <label>
                Скорость
                <input id="speedRange" type="range" min="1" max="3" value="1">
              </label>
              <label id="spawnStyleLabel">
                Шарики
                <select id="spawnStyleSelect">
                  <option value="single" selected>Один шарик</option>
                  <option value="many">Несколько шариков</option>
                </select>
              </label>
              <label id="letterRowLabel">
                Ряд букв
                <select id="letterRowSelect">
                  <option value="all" selected>Все ряды</option>
                  <option value="top">Ряд 1: й-ъ</option>
                  <option value="middle">Ряд 2: ф-э</option>
                  <option value="bottom">Ряд 3: я-ю</option>
                </select>
              </label>
              <label id="phraseTopicLabel">
                Тема фразы
                <select id="phraseTopicSelect">
                  <option value="hedgehog">Ёжик</option>
                  <option value="mushroom">Мухомор</option>
                  <option value="stream">Ручей</option>
                  <option value="forest">Лес</option>
                  <option value="basket">Корзинка</option>
                </select>
              </label>
            </div>

            <div class="checks">
              <label class="check-row" id="floatModeRow">
                <input id="floatModeCheck" type="checkbox">
                <span>Шарики летят снизу вверх</span>
              </label>
              <label class="check-row" id="letterCaseRow">
                <input id="letterCaseCheck" type="checkbox">
                <span>Большие и маленькие буквы</span>
              </label>
              <label class="check-row">
                <input id="penaltyCheck" type="checkbox">
                <span>Снимать очки за ошибку</span>
              </label>
              <label class="check-row">
                <input id="soundCheck" type="checkbox" checked>
                <span>Звук</span>
              </label>
            </div>

            <button class="primary-button" id="startButton" type="button">Начать игру</button>
          </div>
        </div>
      </section>

      <section class="screen game-screen" id="gameScreen" aria-label="Игровое поле">
        <div class="cloud cloud-a"></div>
        <div class="cloud cloud-b"></div>
        <div class="cloud cloud-c"></div>

        <header class="topbar">
          <div class="stat">
            <span class="stat-icon balloon-dot"></span>
            <span id="score">0</span>
          </div>
          <div class="stat">
            <span class="stat-icon crown">★</span>
            <span id="streak">0</span>
          </div>
          <div class="stat error-stat">
            <span class="stat-icon error-mark">!</span>
            <span id="errors">0</span>
          </div>
          <div class="timer" id="timer">60</div>
          <div class="top-actions">
            <button class="icon-button" id="hintButton" type="button" aria-label="Подсказка" title="Подсказка">?</button>
            <button class="icon-button" id="pauseButton" type="button" aria-label="Пауза" title="Пауза">Ⅱ</button>
            <button class="icon-button" id="menuButton" type="button" aria-label="В меню" title="В меню">⌂</button>
          </div>
        </header>

        <div class="game-layer" id="gameLayer" aria-live="polite"></div>

        <section class="phrase-panel" id="phrasePanel" aria-label="Тренировка предложения">
          <div class="phrase-text" id="phraseText"></div>
          <div class="typing-line">
            <span id="typedPreview"></span><span class="caret"></span><span id="leftPreview"></span>
          </div>
        </section>

        <div class="ground">
          <div class="hills hills-back"></div>
          <div class="hills hills-front"></div>
        </div>
      </section>

      <section class="screen result-screen" id="resultScreen" aria-label="Результат">
        <div class="confetti"></div>
        <div class="result-card">
          <div class="result-burst">★</div>
          <h1>Отличная работа!</h1>
          <p id="resultText">Вы набрали 0 очков.</p>
          <div class="result-stats">
            <div>
              <strong id="finalScore">0</strong>
              <span>очков</span>
            </div>
            <div>
              <strong id="finalStreak">0</strong>
              <span>лучшая серия</span>
            </div>
            <div>
              <strong id="finalErrors">0</strong>
              <span>ошибок</span>
            </div>
          </div>
          <div class="result-actions">
            <button class="primary-button" id="againButton" type="button">Сыграть еще</button>
            <button class="secondary-button" id="resultMenuButton" type="button">В меню</button>
          </div>
        </div>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="app.js"></script>
  </body>
</html>
