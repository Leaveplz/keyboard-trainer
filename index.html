<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Тренажер клавиатуры</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <section class="sky" aria-label="Игровое поле">
        <div class="cloud cloud-a"></div>
        <div class="cloud cloud-b"></div>
        <div class="cloud cloud-c"></div>
        <header class="topbar">
          <div class="stat">
            <span class="stat-icon balloon-dot"></span>
            <span id="score">0</span>
          </div>
          <div class="stat">
            <span class="stat-icon crown">★</span>
            <span id="streak">0</span>
          </div>
          <div class="timer" id="timer">60</div>
          <div class="top-actions">
            <button class="icon-button" id="soundButton" type="button" aria-label="Звук включен" title="Звук">♪</button>
            <button class="icon-button" id="pauseButton" type="button" aria-label="Пауза" title="Пауза">Ⅱ</button>
          </div>
        </header>

        <div class="game-layer" id="gameLayer" aria-live="polite"></div>

        <section class="phrase-panel" id="phrasePanel" aria-label="Тренировка предложения">
          <div class="phrase-text" id="phraseText"></div>
          <div class="typing-line">
            <span id="typedPreview"></span><span class="caret"></span><span id="leftPreview"></span>
          </div>
        </section>

        <div class="ground">
          <div class="hills hills-back"></div>
          <div class="hills hills-front"></div>
        </div>
      </section>

      <aside class="control-panel" aria-label="Настройки тренажера">
        <div class="brand">
          <div class="brand-mark">Я</div>
          <div>
            <h1>Тренажер клавиатуры</h1>
            <p>Русские буквы, знаки, числа и предложения</p>
          </div>
        </div>

        <div class="mode-grid" role="tablist" aria-label="Режимы">
          <button class="mode-card active" type="button" data-mode="letters">
            <span>Аа</span>
            <strong>Буквы</strong>
          </button>
          <button class="mode-card" type="button" data-mode="symbols">
            <span>?!</span>
            <strong>Знаки</strong>
          </button>
          <button class="mode-card" type="button" data-mode="numbers">
            <span>12</span>
            <strong>Числа</strong>
          </button>
          <button class="mode-card" type="button" data-mode="phrases">
            <span>«»</span>
            <strong>Фразы</strong>
          </button>
        </div>

        <div class="settings">
          <label>
            Скорость
            <input id="speedRange" type="range" min="1" max="3" value="1">
          </label>
          <label>
            Время
            <select id="durationSelect">
              <option value="45">45 секунд</option>
              <option value="60" selected>60 секунд</option>
              <option value="90">90 секунд</option>
            </select>
          </label>
        </div>

        <div class="lesson-card">
          <h2>Правило пробелов</h2>
          <p>Перед запятой, точкой, двоеточием и восклицательным знаком пробел не ставится. После них пробел нужен.</p>
          <p>Тире в прямой речи обычно отделяется пробелами: <span>«Да, — ответил Петя, — идем!»</span></p>
        </div>

        <button class="primary-button" id="startButton" type="button">Начать заново</button>
      </aside>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="app.js"></script>
  </body>
</html>
